
<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="keywords" content="AustroX GPT, AustroX AI, free AI chat, GPT chat, ChatGPT alternative, AI assistant, Nofal AI, Pakistani AI, voice AI">
  <meta name="author" content="Nofal Fayyaz">
  <meta name="robots" content="index, follow">

  <!-- 🌐 Open Graph / Facebook / WhatsApp Preview -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://austrox.vercel.app/">
  <meta property="og:title" content="AustroX-GPT | Free AI Chat Assistant">
  <meta property="og:description" content="Use AustroX-GPT – a premium AI assistant built by Nofal. Chat, think, and talk with next-gen AI.">
  <meta property="og:image" content="https://austrox.vercel.app/preview.jpg"> <!-- Replace with your image link -->

  <!-- 🐦 Twitter Preview -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://austrox.vercel.app/">
  <meta name="twitter:title" content="AustroX-GPT | Free AI Chat Assistant">
  <meta name="twitter:description" content="AustroX-GPT is a powerful ChatGPT-style AI built by Nofal. Use Quick or Deep modes with voice input support.">
  <meta name="twitter:image" content="https://austrox.vercel.app/preview.jpg"> <!-- Replace with your image link -->
  
  <!-- 📱 App Name & Icon -->
  <link rel="icon" href="favicon.ico" />
  <title>AustroX-GPT | Free AI Chat Assistant</title>
  <script>
    if (!localStorage.getItem("currentUser")) {
      window.location.href = "login.html";
    }
    if (localStorage.getItem("theme") === "light") {
      document.documentElement.classList.add("light");
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="mobile-header">
    <button id="menu-toggle">☰</button>
    <h2>AustroX‑GPT 💎</h2>
    <button onclick="logout()">🚪</button>
  </div>

  <div class="container">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-content">
        <h1>AustroX‑GPT</h1>
        <div><button onclick="startNewChat()">➕ New Chat</button></div>

        <div class="sidebar-section">
          <label>Mode</label>
          <div class="mode-buttons">
            <button id="quickBtn" class="active-mode" onclick="setMode('quick')">⚡ Quick</button>
            <button id="deepBtn" onclick="setMode('deep')">🧠 Deep</button>
          </div>
        </div>

        <div class="sidebar-section">
          <label>Model</label>
          <select onchange="setModel(this.value)">
            <option value="google/gemini-2.0-flash-001">AustoX Fast Model</option>
            <option value="deepseek/deepseek-chat-v3-0324">AustroX Code Generator</option>
            <option value="google/gemma-3-27b-it">AustroX Advanced Model</option>
          </select>
        </div>

        <div class="sidebar-section history-scroll">
          <h3>History</h3>
          <ul id="chat-history-list"></ul>
        </div>
      </div>

      <div class="sidebar-footer">
        <button onclick="toggleTheme()">🌓 Theme</button>
        <button onclick="logout()">🚪 Logout</button>
      </div>
    </aside>

    <main class="chat-main">
      <div class="chat-box-wrapper">
        <a href="aboutus.html" class="about-btn">About Creator</a>
        <div id="chat-box" class="chat-box"></div>
      </div>

      <div class="chat-input-area">
        <input id="user-input" placeholder="Type a message…" />
        <button class="send-btn" onclick="sendMessage()">⬆️</button>
        <button class="send-btn" id="voice-btn" title="Voice input" onclick="startVoiceInput()">🎤</button>
      </div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
