<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AustroX-GPT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div>
        <h1>AustroX-GPT <fevicon class="ico"></fevicon></h1>

        <div class="sidebar-section">
          <button onclick="startNewChat()">➕ New Chat</button>
        </div>

        <div class="sidebar-section">
          <label>Mode</label>
          <div class="mode-buttons">
            <button id="quickBtn" class="active-mode" onclick="setMode('quick')">⚡ Quick Answer</button>
            <button id="deeperBtn" onclick="setMode('deep')">🧠 Deeper Think</button>
          </div>
        </div>

        <div class="sidebar-section">
          <label>Model</label>
          <select onchange="setModel(this.value)">
            
            <option value="meta-llama/llama-3-70b-instruct">Advanced AustroX Nofal v3</option>
          </select>
        </div>

        <div class="sidebar-section">
          <h3>Chat History</h3>
          <ul id="chat-history-list"></ul>
        </div>
      </div>

      <div class="sidebar-footer">
        <button onclick="toggleTheme()">🌓 Toggle Theme</button>
        <button onclick="window.location.href='login.html'">🚪 Logout</button>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-main">
      <div class="chat-box" id="chat-box"></div>

      <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Type your message..." />
        <button class="send-btn" onclick="sendMessage()">⬆️</button>
        <button class="send-btn" title="Voice input" onclick="startVoiceInput()">🎤</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
