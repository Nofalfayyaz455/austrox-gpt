<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AustroX-GPT</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="mobile-header">
    <button id="menu-toggle">☰</button>
    <h2>AustroX-GPT 🔥</h2>
  </div>

  <div class="container">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-content">
        <h1>AustroX-GPT</h1>
        <div class="sidebar-section">
          <button onclick="startNewChat()">➕ New Chat</button>
        </div>

        <div class="sidebar-section">
          <label>Mode</label>
          <div class="mode-buttons">
            <button id="quickBtn" class="active-mode" onclick="setMode('quick')">⚡ Quick</button>
            <button id="deeperBtn" onclick="setMode('deep')">🧠 Deep</button>
          </div>
        </div>

        <div class="sidebar-section">
          <label>Model</label>
          <select onchange="setModel(this.value)">
            <option value="meta-llama/llama-3-70b-instruct">AustroX N1</option>
            <option value="gpt-4">AustroX N2</option>
            <option value="claude-3">AustroX N3</option>
          </select>
        </div>

        <div class="sidebar-section history-scroll">
          <h3>Chat History</h3>
          <ul id="chat-history-list"></ul>
        </div>
      </div>

      <div class="sidebar-footer">
        <button onclick="toggleTheme()">🌓 Theme</button>
        <button onclick="logout()">🚪 Logout</button>
      </div>
    </div>

    <div class="chat-main">
      <div class="chat-box" id="chat-box"></div>
      <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Type your message..." />
        <button class="send-btn" onclick="sendMessage()">⬆️</button>
        <button id="mic-btn" class="send-btn" onclick="startVoiceInput()">🎤</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
