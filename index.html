<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AustroX-GPT</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar desktop-only">
      <h1 class="logo">💎 AustroX</h1>
      <button id="newChat">＋ New Chat</button>
      <ul id="chatHistoryList"></ul>
    </aside>

    <!-- Mobile Menu -->
    <div class="mobile-menu mobile-only">
      <button id="menuToggle">☰</button>
      <div id="mobileSidebar" class="hidden">
        <button id="newChatMobile">＋ New Chat</button>
        <ul id="chatHistoryListMobile"></ul>
      </div>
    </div>

    <!-- Main Chat Section -->
    <main class="chat-area">
      <div class="header">
        <select id="mode">
          <option value="quick">⚡ Quick Answer</option>
          <option value="deep">🧠 Deeper Think</option>
        </select>
        <select id="model">
          <option value="google/gemini-2.0-flash-001">AustroX N1</option>
          <option value="x-ai/grok-4">AustroX N2</option>
          <option value="google/gemma-3n-e2b-it:free">AustroX N3</option>
        </select>
        <button id="themeToggle">🌙</button>
      </div>

      <div id="chatDisplay" class="chat-display"></div>

      <div class="input-area">
        <textarea id="userInput" placeholder="Type your message..."></textarea>
        <button id="sendBtn">➤</button>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
