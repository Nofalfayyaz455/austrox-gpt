<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - AustroX-GPT</title>
  <script>
    // ⚡ Apply theme before page render to prevent flash
    if (localStorage.getItem("theme") === "light") {
      document.documentElement.classList.add("light");
    }
  </script>
  <style>
    :root {
      --bg-dark: #0e1117;
      --bg-light: #ffffff;
      --text-dark: #ffffff;
      --text-light: #000000;
      --card-bg-dark: #161b22;
      --card-bg-light: #f0f0f0;
      --input-bg-dark: #1e222a;
      --input-bg-light: #ffffff;
      --accent: #0a84ff;
      --border-dark: #333333;
      --border-light: #cccccc;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    .auth-body {
      background-color: var(--bg-dark);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .light .auth-body {
      background-color: var(--bg-light);
      color: var(--text-light);
    }

    .auth-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .auth-card {
      background-color: var(--card-bg-dark);
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 400px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .light .auth-card {
      background-color: var(--card-bg-light);
      box-shadow: 0 0 10px #aaa;
    }

    .auth-card input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid var(--border-dark);
      background: var(--input-bg-dark);
      color: var(--text-dark);
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s ease;
    }

    .light input {
      background: var(--input-bg-light);
      color: var(--text-light);
      border: 1px solid var(--border-light);
    }

    .auth-card button {
      padding: 12px 25px;
      margin-top: 15px;
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      font-size: 1rem;
      transition: background 0.3s;
    }

    .auth-card button:hover {
      background: #006be9;
    }

    .auth-note {
      font-size: 0.9rem;
      margin-top: 15px;
    }

    .auth-note a {
      color: #00b3ff;
      text-decoration: none;
    }

    .theme-toggle {
      margin-top: 15px;
      background: transparent;
      border: 1px solid #888;
      padding: 8px 16px;
      color: inherit;
      cursor: pointer;
      border-radius: 4px;
    }

    .theme-toggle:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="auth-body">
  <div class="auth-wrapper">
    <form class="auth-card" onsubmit="login(); return false;">
      <h1>🔐 AustroX-GPT Login</h1>
      <input type="text" id="login-username" placeholder="Username" required autofocus />
      <input type="password" id="login-password" placeholder="Password" required />
      <button type="submit">Login</button>
      <p class="auth-note">Don't have an account? <a href="register.html">Register here</a></p>
      <button type="button" class="theme-toggle" onclick="toggleTheme()">🌓 Toggle Theme</button>
    </form>
  </div>

  <script src="auth.js"></script>
</body>
</html>
