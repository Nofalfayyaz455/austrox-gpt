  <script>
    if (localStorage.getItem("currentUser")) window.location.href = "index.html";
    if (localStorage.getItem("theme") === "light") document.documentElement.classList.add("light");
  </script>

  <style>
    :root {
      --bg-dark:#0e1117;--bg-light:#f7f7f7;--text-dark:#e0e0e0;--text-light:#1a1a1a;
      --card-bg-dark:#161b22;--card-bg-light:#f0f0f0;--input-bg-dark:#1e222a;--input-bg-light:#fff;
      --accent:#00d1ff;--border-dark:#333;--border-light:#ccc;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body.auth-body {
      background:var(--bg-dark); color:var(--text-dark); font-family:Segoe UI,sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center; transition:0.3s;
    }
    .light.auth-body { background:var(--bg-light); color:var(--text-light); }
    .auth-card {
      background:var(--card-bg-dark); padding:2rem; border-radius:10px;
      box-shadow:0 0 15px rgba(0,0,0,0.6); max-width:400px; text-align:center; width:90%;
    }
    .light .auth-card {
      background:var(--card-bg-light); box-shadow:0 0 10px #aaa;
    }
    .auth-card input {
      width:90%; padding:12px; margin:10px 0; border:1px solid var(--border-dark);
      background:var(--input-bg-dark); color:var(--text-dark); border-radius:6px; font-size:1rem;
    }
    .light .auth-card input {
      background:var(--input-bg-light); color:var(--text-light); border:1px solid var(--border-light);
    }
    .auth-card button {
      margin:15px 0 5px; padding:12px 25px; background:var(--accent); color:#fff;
      border:none; border-radius:6px; font-size:1rem; cursor:pointer; transition:0.3s;
    }
    .auth-card button:hover { background:#009ecb; }
    .auth-note { font-size:.9rem; margin-bottom:15px; }
    .auth-note a { color:#00b3ff; text-decoration:none; }
    .theme-toggle {
      padding:8px 16px; background:transparent; border:1px solid #888; border-radius:4px;
      cursor:pointer;
    }
    .theme-toggle:hover { background:rgba(255,255,255,0.1); }

    /* Google login style */
    .google-btn {
      margin-top:10px; display:flex; align-items:center; justify-content:center;
      gap:10px; background:#fff; color:#333; padding:12px 20px; font-size:1rem;
      border-radius:6px; border:1px solid #ccc; cursor:pointer;
    }
    .google-btn img { width:20px; height:20px; }
    .light .google-btn { background:#f7f7f7; color:#1a1a1a; }
    .google-btn:hover { background:#f0f0f0; }
  </style>
</head>
<body class="auth-body">
  <form class="auth-card" onsubmit="login();return false;">
    <h1>🔐 AustroX‑GPT Login</h1>
    <input id="login-username" placeholder="Username" required autofocus />
    <input id="login-password" type="password" placeholder="Password" required />
    <button type="submit">Login</button>
    <p style="margin-top: 1rem;">
  <a href="#" id="forgot-password-link" style="color: var(--accent); text-decoration: underline;">Forgot your password?</a>
</p>


    <p class="auth-note">Don't have an account? <a href="register.html">Register here</a></p>
    <div style="display: flex; align-items: center; text-align: center; margin: 1.5rem 0;">
      <hr style="flex: 1; border: none; border-top: 1px solid gray;">
      <span style="padding: 0 10px; color: gray;">or</span>
      <hr style="flex: 1; border: none; border-top: 1px solid gray;">
    </div>


    <!-- Google Login -->
    <button type="button" id="googleLogin" class="google-btn">
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google Logo" />
      Login with Google
    </button>

    <button type="button" class="theme-toggle" onclick="toggleTheme()">🌓 Toggle Theme</button>

    <p class="auth-note">By Logging in, You accept our <a href='terms.html'>terms and conditions</a><strong> and </strong><a href='privacy.html'>Privacy Policy.</a></p>
    <p> &copy; 2025 | All Rights Reserved </p>
  </form>

  <script src="auth.js"></script>

  <!-- Firebase SDK (v11.10.0) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-analytics.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7J-qMgYD0AuIFSQ45rzU2tALtRZWHmwE",
      authDomain: "austrox-gpt.firebaseapp.com",
      projectId: "austrox-gpt",
      storageBucket: "austrox-gpt.firebasestorage.app",
      messagingSenderId: "70633222222",
      appId: "1:70633222222:web:e989b8718fc3f502c5131f",
      measurementId: "G-SQD3V1STWE"
    };

    const app = initializeApp(firebaseConfig);
    getAnalytics(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    document.getElementById("googleLogin").addEventListener("click", () => {
      signInWithPopup(auth, provider)
        .then(result => {
          const user = result.user;
          const currentUser = {
            name: user.displayName,
            email: user.email,
            picture: user.photoURL
          };
          localStorage.setItem("currentUser", JSON.stringify(currentUser));
          window.location.href = "index.html";
        })
        .catch(error => {
          alert("Google Login Failed: " + error.message);
        });
    });
      const forgotLink = document.getElementById("forgot-password-link");
  const modal = document.getElementById("forgot-password-modal");

  forgotLink.onclick = () => modal.style.display = "flex";
  function closeResetModal() {
    modal.style.display = "none";
  }

  // Firebase Password Reset
  function sendResetEmail() {
    const email = document.getElementById("reset-email").value;
    if (!email) {
      alert("Please enter your email.");
      return;
    }

    firebase.auth().sendPasswordResetEmail(email)
      .then(() => {
        alert("Password reset email sent! Check your inbox.");
        closeResetModal();
      })
      .catch((error) => {
        console.error("Reset email error:", error);
        alert("Error: " + error.message);
      });
  }
  </script>
  <!-- Forgot Password Modal -->
  <div id="forgot-password-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:var(--bg-light); color:var(--text-light); padding:2rem; border-radius:10px; width:90%; max-width:400px;">
      <h2 style="margin-bottom: 1rem;">Reset Password</h2>
      <input type="email" id="reset-email" placeholder="Enter your email" required style="width:100%; padding:0.8rem; margin-bottom:1rem; background:var(--input-dark); color:var(--text-dark); border:1px solid #ccc; border-radius:5px;" />
      <button onclick="sendResetEmail()" style="padding:0.8rem 1.5rem; background:var(--accent); border:none; color:#fff; border-radius:5px;">Send Reset Email</button>
      <button onclick="closeResetModal()" style="margin-left:1rem; padding:0.8rem 1.5rem; background:#ccc; border:none; border-radius:5px;">Cancel</button>
    </div>
  </div>

</body>
</html>
