<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | AustroX-GPT</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: sans-serif;
      background: #0d0f14;
      color: #fff;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: #1a1d23;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px cyan;
      width: 90%;
      max-width: 400px;
    }
    .login-box h2 {
      text-align: center;
      margin-bottom: 1rem;
    }
    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background: #2a2e37;
      color: #fff;
    }
    .login-box button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #00d1ff;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }
    .login-box button:hover {
      background: #00aacc;
    }
    .forgot-password {
      text-align: center;
      margin-top: 10px;
    }
    .forgot-password a {
      color: #00d1ff;
      cursor: pointer;
    }
    .popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
    }
    .popup-content {
      background: #1a1d23;
      padding: 2rem;
      border-radius: 10px;
      text-align: center;
    }
    .popup-content input {
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>🔐 AustroX‑GPT Login</h2>
    <input type="email" id="loginEmail" placeholder="Email" required />
    <input type="password" id="loginPassword" placeholder="Password" required />
    <button onclick="login()">Login</button>
    <div class="forgot-password">
      <a onclick="showResetPopup()">Forgot password?</a>
    </div>
  </div>

  <!-- Reset Password Popup -->
  <div class="popup" id="resetPopup">
    <div class="popup-content">
      <h3>🔄 Reset Password</h3>
      <input type="email" id="resetEmail" placeholder="Enter your email" />
      <button onclick="sendResetEmail()">Send Reset Email</button>
      <button onclick="closeResetPopup()" style="background: crimson; margin-top: 10px;">Cancel</button>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA7J-qMgYD0AuIFSQ45rzU2tALtRZWHmwE",
      authDomain: "austrox-gpt.firebaseapp.com",
      projectId: "austrox-gpt",
      storageBucket: "austrox-gpt.appspot.com",
      messagingSenderId: "70633222222",
      appId: "1:70633222222:web:e989b8718fc3f502c5131f",
      measurementId: "G-SQD3V1STWE"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function login() {
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      if (!email || !password) return alert("Please enter email and password.");

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          alert("Login successful!");
          localStorage.setItem("currentUser", JSON.stringify({
            email: userCredential.user.email,
            name: userCredential.user.displayName || "User",
            picture: "https://ui-avatars.com/api/?name=" + userCredential.user.displayName
          }));
          window.location.href = "index.html";
        })
        .catch((error) => {
          alert("Login failed: " + error.message);
        });
    }

    function showResetPopup() {
      document.getElementById("resetPopup").style.display = "flex";
    }

    function closeResetPopup() {
      document.getElementById("resetPopup").style.display = "none";
    }

    function sendResetEmail() {
      const email = document.getElementById("resetEmail").value;
      if (!email) return alert("Please enter your email.");
      auth.sendPasswordResetEmail(email)
        .then(() => {
          alert("Reset email sent! Check your inbox.");
          closeResetPopup();
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
    }
  </script>
</body>
</html>
